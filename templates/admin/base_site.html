{% extends "admin/base.html" %}
{% load i18n %}

{% block title %}{{ title }} | Middle Belt Memorial{% endblock %}

{% block branding %}
<h1 id="site-name">
  <a href="{% url 'admin:index' %}" style="display:flex;align-items:center;gap:10px;color:#fff;text-decoration:none;">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
      style="opacity:0.9">
      <circle cx="12" cy="12" r="10"/>
      <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      <path d="M2 12h20"/>
    </svg>
    <span style="font-size:15px;font-weight:600;letter-spacing:0.01em;">Middle Belt Memorial</span>
  </a>
</h1>
{% endblock %}

{% block extrahead %}
{{ block.super }}
<style>
  /* ── Colour palette ──────────────────────────────────────── */
  :root {
    --primary:                  #4b6bfb;
    --secondary:                #0f1c5c;
    --accent:                   #fbbf24;
    --primary-fg:               #fff;
    --header-bg:                #0f1c5c;
    --header-link-color:        #c7d2fe;
    --breadcrumbs-bg:           #4b6bfb;
    --breadcrumbs-fg:           rgba(255,255,255,0.7);
    --breadcrumbs-link-fg:      #fff;
    --link-fg:                  #4b6bfb;
    --link-hover-color:         #3451e0;
    --link-selected-fg:         #3451e0;
    --button-bg:                #4b6bfb;
    --button-hover-bg:          #3451e0;
    --default-button-bg:        #0f1c5c;
    --default-button-hover-bg:  #162480;
    --selected-bg:              #eef2ff;
    --selected-row:             #f0f4ff;
    --darkened-bg:              #f5f8ff;
    --body-bg:                  #f8faff;
    --hairline-color:           #e0e7ff;
    --border-color:             #c7d2fe;
    --delete-button-bg:         #ef4444;
    --delete-button-hover-bg:   #dc2626;
  }

  /* ── Header ─────────────────────────────────────────────── */
  #header {
    background: #0f1c5c;
    border-bottom: 1px solid rgba(75,107,251,0.3);
    padding: 0 20px;
    height: 52px;
    display: flex;
    align-items: center;
  }
  #branding { flex: 1; }
  #user-tools {
    font-size: 12px;
    color: #a5b4fc;
  }
  #user-tools a { color: #c7d2fe; }
  #user-tools a:hover { color: #fff; }
  #logout-form button { color: #c7d2fe; background: none; border: none; cursor: pointer; font-size: 12px; }
  #logout-form button:hover { color: #fff; }

  /* ── Navigation ──────────────────────────────────────────── */
  div.breadcrumbs {
    background: #4b6bfb;
    padding: 8px 20px;
    font-size: 12px;
  }
  div.breadcrumbs a { color: rgba(255,255,255,0.8); }
  div.breadcrumbs a:hover { color: #fff; }

  /* ── Body & layout ───────────────────────────────────────── */
  body {
    background: #f5f8ff;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  }
  #content { padding: 24px 28px; }
  #content-main { background: transparent; }

  /* ── Module headers (app sections) ──────────────────────── */
  .module caption, .module h2 {
    background: #0f1c5c;
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 8px 14px;
    border-radius: 8px 8px 0 0;
    text-transform: uppercase;
  }
  .module {
    border-radius: 8px;
    overflow: hidden;
    border: 1px solid #e0e7ff;
    box-shadow: 0 1px 8px rgba(75,107,251,0.07);
    background: #fff;
    margin-bottom: 20px;
  }

  /* ── Changelist table ────────────────────────────────────── */
  #changelist table thead th {
    background: #f0f4ff;
    color: #374151;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border-bottom: 2px solid #e0e7ff;
    padding: 10px 14px;
  }
  #changelist table tbody tr:hover { background: #f5f8ff; }
  #changelist table tbody td { padding: 10px 14px; border-bottom: 1px solid #eef2ff; font-size: 13px; }
  #changelist-filter {
    background: #fff;
    border-left: 1px solid #e0e7ff;
    padding: 16px;
  }
  #changelist-filter h2 {
    background: #f0f4ff;
    color: #0f1c5c;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 8px 12px;
    border-radius: 6px;
    margin-bottom: 10px;
  }
  #changelist-filter h3 {
    font-size: 11px;
    font-weight: 700;
    color: #6b7280;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin: 16px 0 6px;
  }
  #changelist-filter li.selected a { color: #4b6bfb; font-weight: 600; }

  /* ── Forms ───────────────────────────────────────────────── */
  .form-row { padding: 10px 0; border-bottom: 1px solid #eef2ff; }
  fieldset.module h2 { text-transform: uppercase; }
  .field-box label, .form-row label { font-size: 12px; font-weight: 600; color: #374151; }
  input[type=text], input[type=email], input[type=password], input[type=number],
  input[type=url], select, textarea {
    border: 1px solid #c7d2fe;
    border-radius: 6px;
    padding: 6px 10px;
    font-size: 13px;
    transition: border-color 0.2s;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #4b6bfb;
    box-shadow: 0 0 0 3px rgba(75,107,251,0.15);
  }

  /* ── Buttons ─────────────────────────────────────────────── */
  .button, input[type=submit], input[type=button], .submit-row input, a.button {
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    padding: 7px 16px;
    letter-spacing: 0.01em;
  }
  .submit-row {
    background: #f5f8ff;
    border-top: 1px solid #e0e7ff;
    border-radius: 0 0 8px 8px;
    padding: 12px 16px;
  }
  .deletelink-box a.deletelink {
    background: #ef4444;
    border-radius: 6px;
    padding: 7px 16px;
    color: #fff;
    font-size: 12px;
    font-weight: 600;
  }

  /* ── Messages ────────────────────────────────────────────── */
  ul.messagelist li {
    border-radius: 6px;
    font-size: 13px;
    margin-bottom: 8px;
    padding: 10px 16px;
  }
  ul.messagelist li.success { background: #d1fae5; color: #065f46; border-left: 4px solid #10b981; }
  ul.messagelist li.warning { background: #fef3c7; color: #92400e; border-left: 4px solid #f59e0b; }
  ul.messagelist li.error   { background: #fee2e2; color: #7f1d1d; border-left: 4px solid #ef4444; }

  /* ── Sidebar (recent actions) ────────────────────────────── */
  #content-related .module { border-color: #e0e7ff; }
  #recent-actions-module h2 { background: #0f1c5c; }
  #recent-actions-module .actionlist li { font-size: 12px; padding: 5px 0; border-bottom: 1px solid #eef2ff; }

  /* ── Pagination ──────────────────────────────────────────── */
  .paginator a, .paginator span { border-radius: 4px; font-size: 12px; }
  .paginator .this-page { background: #4b6bfb; color: #fff; border-radius: 4px; padding: 3px 8px; }

  /* ── Object tools ────────────────────────────────────────── */
  ul.object-tools li a {
    background: #4b6bfb;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }
  ul.object-tools li a:hover { background: #3451e0; }
</style>
{% endblock %}
